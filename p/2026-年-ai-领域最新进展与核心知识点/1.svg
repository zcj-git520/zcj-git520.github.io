<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Circuit pattern -->
  <g stroke="#00d9ff" stroke-width="1" opacity="0.2" fill="none">
    <path d="M100,100 L200,100 L200,150 L300,150"/>
    <path d="M150,200 L150,250 L250,250 L250,300"/>
    <path d="M900,100 L800,100 L800,150 L700,150"/>
    <path d="M850,200 L850,250 L750,250 L750,300"/>
    <circle cx="200" cy="100" r="4" fill="#00d9ff"/>
    <circle cx="300" cy="150" r="4" fill="#00ff88"/>
    <circle cx="800" cy="100" r="4" fill="#00d9ff"/>
    <circle cx="700" cy="150" r="4" fill="#00ff88"/>
  </g>
  
  <!-- Central AI brain icon -->
  <g transform="translate(600, 280)" filter="url(#glow)">
    <!-- Brain outline -->
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <!-- Neural connections -->
    <circle cx="-40" cy="-30" r="8" fill="#00d9ff" opacity="0.8"/>
    <circle cx="40" cy="-30" r="8" fill="#00ff88" opacity="0.8"/>
    <circle cx="0" cy="30" r="10" fill="#00d9ff" opacity="0.9"/>
    <circle cx="-60" cy="20" r="6" fill="#00ff88" opacity="0.7"/>
    <circle cx="60" cy="20" r="6" fill="#00d9ff" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="-40" y1="-30" x2="0" y2="30" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="-30" x2="0" y2="30" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
    <line x1="-60" y1="20" x2="-40" y2="-30" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="20" x2="40" y2="-30" stroke="#00d9ff" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Title text -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">AI 2026</text>
  <text x="600" y="495" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.9">最新进展与核心知识点</text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="150" cy="500" r="50" fill="none" stroke="#00d9ff" stroke-width="1"/>
    <circle cx="1050" cy="130" r="80" fill="none" stroke="#00ff88" stroke-width="1"/>
    <circle cx="200" cy="550" r="30" fill="none" stroke="#00d9ff" stroke-width="1"/>
  </g>
  
  <!-- Year badge -->
  <g transform="translate(1000, 550)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#16213e" stroke="url(#accentGrad)" stroke-width="2"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">2026</text>
  </g>
</svg>
