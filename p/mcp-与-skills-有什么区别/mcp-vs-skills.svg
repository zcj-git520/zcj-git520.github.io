<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skillsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8fafc"/>
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">MCP vs Skills 架构对比</text>
  
  <!-- MCP 侧 (左侧) -->
  <g transform="translate(50, 80)">
    <!-- MCP 标题框 -->
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#mcpGrad)" filter="url(#shadow)"/>
    <text x="150" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">MCP 协议</text>
    
    <!-- MCP 组件 -->
    <rect x="50" y="90" width="200" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="150" y="120" text-anchor="middle" font-size="14" fill="#3730a3">AI 模型 (Claude 等)</text>
    
    <line x1="150" y1="140" x2="150" y2="170" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="50" y="170" width="200" height="50" rx="6" fill="#c7d2fe" stroke="#4f46e5" stroke-width="2"/>
    <text x="150" y="195" text-anchor="middle" font-size="14" fill="#312e81">MCP Client</text>
    <text x="150" y="212" text-anchor="middle" font-size="10" fill="#6366f1">标准化协议</text>
    
    <line x1="150" y1="220" x2="150" y2="250" stroke="#4f46e5" stroke-width="2"/>
    
    <rect x="50" y="250" width="200" height="50" rx="6" fill="#a5b4fc" stroke="#4338ca" stroke-width="2"/>
    <text x="150" y="275" text-anchor="middle" font-size="14" fill="#1e1b4b">MCP Server</text>
    <text x="150" y="292" text-anchor="middle" font-size="10" fill="#4338ca">JSON-RPC 接口</text>
    
    <line x1="150" y1="300" x2="150" y2="330" stroke="#4338ca" stroke-width="2"/>
    
    <rect x="20" y="330" width="80" height="40" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="60" y="355" text-anchor="middle" font-size="11" fill="#475569">数据源 1</text>
    
    <rect x="110" y="330" width="80" height="40" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="150" y="355" text-anchor="middle" font-size="11" fill="#475569">数据源 2</text>
    
    <rect x="200" y="330" width="80" height="40" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="240" y="355" text-anchor="middle" font-size="11" fill="#475569">工具/服务</text>
    
    <!-- 特点标签 -->
    <rect x="0" y="400" width="300" height="35" rx="4" fill="#f8fafc" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="150" y="422" text-anchor="middle" font-size="11" fill="#475569">✓ 标准化协议 ✓ 跨平台 ✓ 安全沙箱</text>
  </g>
  
  <!-- VS 分隔符 -->
  <g transform="translate(375, 230)">
    <circle cx="0" cy="0" r="30" fill="#1e293b"/>
    <text x="0" y="5" text-anchor="middle" font-size="16" font-weight="bold" fill="white">VS</text>
  </g>
  
  <!-- Skills 侧 (右侧) -->
  <g transform="translate(450, 80)">
    <!-- Skills 标题框 -->
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#skillsGrad)" filter="url(#shadow)"/>
    <text x="150" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">Skills 技能</text>
    
    <!-- Skills 组件 -->
    <rect x="50" y="90" width="200" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="120" text-anchor="middle" font-size="14" fill="#065f46">AI Agent</text>
    
    <line x1="150" y1="140" x2="150" y2="170" stroke="#10b981" stroke-width="2"/>
    
    <rect x="50" y="170" width="200" height="50" rx="6" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>
    <text x="150" y="195" text-anchor="middle" font-size="14" fill="#064e3b">Skills 管理器</text>
    <text x="150" y="212" text-anchor="middle" font-size="10" fill="#10b981">技能发现/调度</text>
    
    <line x1="150" y1="220" x2="150" y2="250" stroke="#059669" stroke-width="2"/>
    
    <!-- 三个技能框 -->
    <rect x="20" y="250" width="80" height="45" rx="4" fill="#6ee7b7" stroke="#047857" stroke-width="1.5"/>
    <text x="60" y="272" text-anchor="middle" font-size="12" fill="#064e3b">Skill 1</text>
    <text x="60" y="287" text-anchor="middle" font-size="9" fill="#059669">weather</text>
    
    <rect x="110" y="250" width="80" height="45" rx="4" fill="#6ee7b7" stroke="#047857" stroke-width="1.5"/>
    <text x="150" y="272" text-anchor="middle" font-size="12" fill="#064e3b">Skill 2</text>
    <text x="150" y="287" text-anchor="middle" font-size="9" fill="#059669">search</text>
    
    <rect x="200" y="250" width="80" height="45" rx="4" fill="#6ee7b7" stroke="#047857" stroke-width="1.5"/>
    <text x="240" y="272" text-anchor="middle" font-size="12" fill="#064e3b">Skill 3</text>
    <text x="240" y="287" text-anchor="middle" font-size="9" fill="#059669">memory</text>
    
    <line x1="150" y1="295" x2="150" y2="320" stroke="#047857" stroke-width="2"/>
    
    <rect x="50" y="320" width="200" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="150" y="345" text-anchor="middle" font-size="13" fill="#166534">外部系统/API</text>
    <text x="150" y="362" text-anchor="middle" font-size="10" fill="#15803d">数据库/云服务/设备</text>
    
    <!-- 特点标签 -->
    <rect x="0" y="400" width="300" height="35" rx="4" fill="#f8fafc" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="150" y="422" text-anchor="middle" font-size="11" fill="#475569">✓ 灵活实现 ✓ 深度集成 ✓ 快速开发</text>
  </g>
  
  <!-- 底部对比表格 -->
  <g transform="translate(100, 455)">
    <rect x="0" y="0" width="600" height="35" rx="4" fill="#1e293b"/>
    <text x="100" y="23" text-anchor="middle" font-size="11" fill="white">标准化程度</text>
    <text x="220" y="23" text-anchor="middle" font-size="11" fill="#a5b4fc">高 (统一协议)</text>
    <text x="380" y="23" text-anchor="middle" font-size="11" fill="#6ee7b7">中 (平台自定义)</text>
  </g>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
</svg>
